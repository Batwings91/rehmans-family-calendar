<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Rehmans Family Calendar 🗓️</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#e93ca3">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Rehmans">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,900&family=Inter+Tight:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f6f1e7;
      --surface: #fffaf0;
      --ink: #1a0a14;
      --ink-soft: #4a2a3a;
      --line: #2a1018;
      --berry: #e93ca3;
      --berry-deep: #b8217a;
      --acid: #d1db58;
      --good: #1f8f4a;
      --rusty: #d97a1f;
      --learn: #c12c2c;
      --text: #1a0a14;
      --muted: #7a5a68;
      --all: #1f8f4a;
      --caldecote: #2f7fb0;
      --omar: #e93ca3;
      --nini: #8e3cc9;
      --farooq: #2f7fb0;
      --user-color: var(--omar);
      --radius: 14px;
      --shadow: 4px 4px 0 var(--line);
      --shadow-sm: 2px 2px 0 var(--line);
    }
    body {
      font-family: 'Inter Tight', system-ui, sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      padding-bottom: 72px;
      -webkit-font-smoothing: antialiased;
    }
    body.compact-mode .summary-card,
    body.compact-mode .event-list-card {
      display: none;
    }
    header {
      background: var(--surface);
      text-align: center;
      padding: 16px 16px 14px;
      border-bottom: 2px solid var(--line);
      box-shadow: 0 3px 0 var(--line);
      position: sticky;
      top: 0;
      z-index: 20;
    }
    header h1 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.25rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .you-are {
      font-size: 0.66rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-weight: 700;
      color: var(--muted);
      margin-top: 6px;
    }
    .you-are button {
      background: none;
      border: none;
      color: var(--berry-deep);
      text-decoration: underline;
      cursor: pointer;
      font: inherit;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      padding: 0;
    }
    .top-strip { padding: 12px 12px 4px; }
    .month-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .month-nav-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      min-width: 0;
    }
    .month-nav h2 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 1.15rem;
      font-weight: 800;
      min-width: 120px;
      text-align: center;
    }
    .nav-btn, .today-btn, .toolbar-btn, .modal-btn, .event-btn {
      background: var(--surface);
      border: 1.5px solid var(--line);
      border-radius: 9999px;
      padding: 7px 14px;
      font: inherit;
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      color: var(--ink);
      box-shadow: var(--shadow-sm);
      transition: transform 0.05s ease, box-shadow 0.05s ease, background 0.12s ease;
    }
    .nav-btn:hover, .today-btn:hover, .toolbar-btn:hover, .modal-btn:hover, .event-btn:hover {
      transform: translate(-1px, -1px);
      box-shadow: 3px 3px 0 var(--line);
    }
    .nav-btn:active, .today-btn:active, .toolbar-btn:active, .modal-btn:active, .event-btn:active {
      transform: translate(2px, 2px);
      box-shadow: none;
    }
    .nav-btn:disabled { opacity: 0.4; box-shadow: none; cursor: default; transform: none; }
    .nav-btn {
      border-radius: 50%;
      width: 36px;
      height: 36px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.05rem;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      padding: 10px 12px 0;
      flex-wrap: wrap;
    }
    .toolbar-btn:hover { background: var(--acid); }
    .summary-card, .event-list-card {
      margin: 12px 12px 0;
      background: var(--surface);
      border: 1.5px solid var(--line);
      border-left-width: 6px;
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: var(--shadow);
    }
    .summary-card { border-left-color: var(--good); }
    .event-list-card { border-left-color: var(--berry); }
    .summary-card h3, .event-list-card h3 {
      font-family: 'Fraunces', Georgia, serif;
      font-size: 0.98rem;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .summary-list, .event-list {
      display: grid;
      gap: 6px;
      font-size: 0.84rem;
    }
    .event-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 9px 0;
      border-top: 1.5px solid rgba(42, 16, 24, 0.12);
    }
    .event-item:first-child { border-top: none; }
    .event-meta { color: var(--muted); font-size: 0.74rem; font-weight: 600; }
    .cal-wrap {
      margin: 12px;
      background: var(--surface);
      border: 1.5px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .dow-header, .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
    }
    .dow-header {
      background: var(--ink);
      color: var(--bg);
      font-size: 0.66rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      text-align: center;
      padding: 11px 0;
    }
    .day {
      min-height: 124px;
      border-top: 1.5px solid rgba(42, 16, 24, 0.14);
      border-right: 1.5px solid rgba(42, 16, 24, 0.14);
      padding: 8px 6px;
      position: relative;
      background: var(--surface);
      min-width: 0;
      overflow: hidden;
    }
    .day:nth-child(7n) { border-right: none; }
    .day.empty { background: #efe7d7; }
    .day.today-cell { box-shadow: inset 0 0 0 3px var(--berry); }
    .day.has-all { background: color-mix(in srgb, var(--acid) 40%, white); }
    .day.caldecote { background: color-mix(in srgb, var(--caldecote) 14%, white); }
    .day-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
      margin-bottom: 8px;
      min-width: 0;
    }
    .day-num { font-family: 'Fraunces', Georgia, serif; font-size: 0.95rem; font-weight: 800; }
    .day-badges {
      display: flex;
      flex-wrap: nowrap;
      justify-content: flex-end;
      gap: 4px;
      overflow: hidden;
      white-space: nowrap;
      min-width: 0;
      flex: 1;
    }
    .tag-chip {
      border: 1.2px solid var(--line);
      border-radius: 9999px;
      padding: 2px 7px;
      font-size: 0.58rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      background: var(--acid);
      color: var(--ink);
      max-width: 78px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      display: inline-block;
      vertical-align: top;
      flex: 0 1 auto;
      min-width: 0;
    }
    .tag-chip.caldecote-chip { background: var(--caldecote); color: #fff; }
    .tag-chip.kids-chip { background: var(--rusty); color: #fff; }
    .confirmed-toggle {
      margin-top: 6px;
      font-size: 0.6rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--good);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .confirmed-toggle input { accent-color: var(--good); }
    .slots { display: grid; gap: 6px; }
    .slot-btn {
      border: 1.2px solid var(--line);
      border-radius: 9px;
      padding: 8px 0;
      background: var(--surface);
      font: inherit;
      font-size: 0.68rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      cursor: pointer;
      color: var(--ink);
    }
    .slot-owners {
      display: block;
      font-size: 0.54rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-top: 2px;
      line-height: 1.1;
      opacity: 0.9;
    }
    .slot-btn.mine { background: color-mix(in srgb, var(--user-color, var(--omar)) 16%, white); color: var(--user-color, var(--omar)); border-color: var(--user-color, var(--omar)); }
    .slot-btn.all-free { background: var(--acid); color: var(--ink); border-color: var(--line); box-shadow: var(--shadow-sm); }
    .slot-btn.partial { background: color-mix(in srgb, var(--nini) 14%, white); color: var(--nini); border-color: color-mix(in srgb, var(--nini) 50%, white); }
    .slot-btn.busy { opacity: 0.5; }
    body.compact-mode .day {
      min-height: 64px;
      padding: 5px 4px;
    }
    body.compact-mode .day-top {
      margin-bottom: 4px;
      align-items: flex-start;
    }
    body.compact-mode .day-num {
      font-size: 0.78rem;
    }
    body.compact-mode .tag-chip {
      max-width: 40px;
      font-size: 0.5rem;
      padding: 1px 5px;
    }
    body.compact-mode .slots {
      gap: 3px;
    }
    body.compact-mode .slot-btn {
      font-size: 0.56rem;
      padding: 3px 0;
      border-radius: 6px;
    }
    body.compact-mode .slot-owners {
      font-size: 0.42rem;
      margin-top: 1px;
    }
    body.compact-mode .slot-btn.all-free { font-weight: 900; box-shadow: none; }
    body.compact-mode .slot-btn::after {
      display: none;
    }
    #user-overlay, #event-modal, #day-modal {
      position: fixed;
      inset: 0;
      background: rgba(26, 10, 20, 0.55);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 40;
      padding: 20px;
    }
    .panel, .modal-card {
      background: var(--surface);
      border: 1.5px solid var(--line);
      border-radius: 18px;
      padding: 22px;
      width: min(460px, 100%);
      text-align: center;
      box-shadow: var(--shadow);
    }
    .panel h2 { font-family: 'Fraunces', Georgia, serif; font-weight: 900; }
    .user-btns { display: grid; gap: 10px; margin-top: 16px; }
    .user-btn {
      padding: 15px 20px;
      border-radius: 9999px;
      border: 1.5px solid var(--line);
      font: inherit;
      font-size: 1rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: white;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: transform 0.05s ease, box-shadow 0.05s ease;
    }
    .user-btn:active { transform: translate(2px, 2px); box-shadow: none; }
    .user-btn.omar { background: var(--omar); }
    .user-btn.nini { background: var(--nini); }
    .user-btn.farooq { background: var(--farooq); }
    .modal-card { text-align: left; }
    .modal-card h3 { font-family: 'Fraunces', Georgia, serif; font-weight: 800; margin-bottom: 12px; }
    .modal-field { margin-bottom: 10px; }
    .modal-field label { display: block; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 700; color: var(--muted); margin-bottom: 5px; }
    .modal-field input, .modal-field select {
      width: 100%; padding: 11px; border: 1.5px solid var(--line); border-radius: 10px; font: inherit; background: #fff;
    }
    .hidden-field { display: none; }
    .attendee-list { display: flex; gap: 8px; flex-wrap: wrap; }
    .attendee-pill {
      border: 1.5px solid var(--line); border-radius: 9999px; padding: 7px 12px; cursor: pointer; font-size: 0.72rem; font-weight: 700; background: #fff;
    }
    .attendee-pill.active { background: var(--berry); color: #fff; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
    .day-modal-slot-grid { display: grid; gap: 8px; margin-top: 12px; }
    .day-modal-events { margin-top: 12px; display: grid; gap: 8px; }
    .day-modal-event { font-size: 0.78rem; font-weight: 600; padding: 9px 11px; background: var(--bg); border: 1.2px solid var(--line); border-radius: 10px; cursor: pointer; text-align: left; }
    #sync-bar {
      text-align: center;
      font-size: 0.64rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 12px 12px 16px;
      color: var(--ink-soft);
    }
    @media (max-width: 768px) {
      body:not(.compact-mode) .dow-header,
      body:not(.compact-mode) .cal-grid {
        min-width: 0;
      }
      body:not(.compact-mode) .day {
        padding: 6px 4px;
      }
      body:not(.compact-mode) .day-top {
        flex-direction: column;
        align-items: flex-start;
      }
      body:not(.compact-mode) .day-badges {
        width: 100%;
        justify-content: flex-start;
      }
      body:not(.compact-mode) .tag-chip {
        max-width: 100%;
      }
      body:not(.compact-mode) .slot-btn {
        font-size: 0.6rem;
        padding: 6px 0;
      }
      body:not(.compact-mode) .slot-owners {
        font-size: 0.46rem;
      }
    }
    @media (min-width: 900px) {
      body { max-width: 960px; margin: 0 auto; }
      .day { min-height: 132px; }
    }
  </style>
</head>
<body>
<div id="user-overlay">
  <div class="panel">
    <h2>👋 Who are you?</h2>
    <p style="margin-top:6px;color:var(--muted);font-size:0.9rem;">Pick your name to view and update your availability</p>
    <div class="user-btns">
      <button class="user-btn omar" onclick="selectUser('omar')">Omar 🟠</button>
      <button class="user-btn nini" onclick="selectUser('nini')">Nini 🟣</button>
      <button class="user-btn farooq" onclick="selectUser('farooq')">Farooq / Steph 🔵</button>
    </div>
  </div>
</div>
<header>
  <h1><span>Rehmans Family Calendar 🗓️</span></h1>
  <div class="you-are" id="you-are-line"></div>
</header>
<div class="top-strip">
  <div class="month-nav">
    <button class="nav-btn" id="prev-btn" onclick="changeMonth(-1)">‹</button>
    <div class="month-nav-center">
      <h2 id="month-label"></h2>
      <div style="text-align:center;margin-top:3px">
        <button class="today-btn" onclick="goToday()">Today</button>
      </div>
    </div>
    <button class="nav-btn" id="next-btn" onclick="changeMonth(1)">›</button>
  </div>
</div>
<div class="toolbar">
  <button class="toolbar-btn" onclick="openEventModal()">+ Add special event</button>
  <button class="toolbar-btn" onclick="toggleCaldecoteWeekends()" id="caldecote-toggle-btn">Caldecote weekends: off</button>
  <button class="toolbar-btn" onclick="toggleCompactMode()" id="compact-toggle-btn">Compact mode: off</button>
  <button class="toolbar-btn" onclick="exportICS()">Export calendar (.ics)</button>
</div>
<div class="summary-card" id="summary-card"></div>
<div class="event-list-card" id="event-list-card"></div>
<div class="cal-wrap">
  <div class="dow-header">
    <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
  </div>
  <div class="cal-grid" id="cal-grid"></div>
</div>
<div id="sync-bar">Ready</div>
<div id="event-modal">
  <div class="modal-card">
    <h3 id="event-modal-title">Add family event</h3>
    <div class="modal-field" id="event-title-field">
      <label for="event-title">Title</label>
      <input id="event-title" type="text" placeholder="e.g. Farooq / Steph dinner">
    </div>
    <div class="modal-field">
      <label for="event-date">Start date</label>
      <input id="event-date" type="date">
    </div>
    <div class="modal-field" id="event-end-date-field">
      <label for="event-end-date">End date (optional)</label>
      <input id="event-end-date" type="date">
    </div>
    <div class="modal-field hidden-field" id="kids-help-field" style="font-size:0.76rem;color:var(--muted);line-height:1.35;">
      Marks a recurring kids weekend from <strong>Friday evening to Sunday evening</strong>, every <strong>2 weeks</strong> until the date above.
    </div>
    <div class="modal-field">
      <label for="event-type">Type</label>
      <select id="event-type" onchange="handleEventTypeChange()">
        <option value="important">Important event</option>
        <option value="caldecote">Caldecote weekend</option>
        <option value="kids-omar">Kids with Omar</option>
      </select>
    </div>
    <div class="modal-field">
      <label>Attendees</label>
      <div class="attendee-list" id="attendee-list"></div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn" onclick="closeEventModal()">Cancel</button>
      <button class="modal-btn" id="delete-event-btn" onclick="deleteCurrentEvent()" style="display:none;">Delete</button>
      <button class="modal-btn" onclick="saveEventModal()">Save</button>
    </div>
  </div>
</div>
<div id="day-modal">
  <div class="modal-card">
    <h3 id="day-modal-title">Day details</h3>
    <div class="day-modal-slot-grid" id="day-modal-slot-grid"></div>
    <div class="day-modal-events" id="day-modal-events"></div>
    <div class="modal-actions">
      <button class="modal-btn" onclick="closeDayModal()">Close</button>
    </div>
  </div>
</div>
<!-- Supabase client (UMD build exposes a global `supabase`), matching omar-eniko-calendar -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>
<script>
'use strict';

// ============================================================
// Supabase config. The anon key is PUBLIC by design — safe to
// commit and ship in the browser. NEVER put the service_role key here.
// ============================================================
const SUPABASE_URL = 'https://cnylugjbbjyqlryhpetf.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNueWx1Z2piYmp5cWxyeWhwZXRmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkwMTg1MDksImV4cCI6MjA5NDU5NDUwOX0.iMZ8jA9gVqxzxVLzKJ-73ssnll6DPzn_8iMF_-sJgq4';
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let loadedOk = false;

const STORAGE_KEY = 'rehmans_calendar_user';
const COMPACT_KEY = 'rehmans_calendar_compact_mode';
const SLOTS = ['morning', 'afternoon', 'evening'];
const SLOT_LABELS = { morning: 'AM', afternoon: 'PM', evening: 'Eve' };
const USERS = ['omar', 'nini', 'farooq'];
const USER_DISPLAY = { omar: 'Omar 🟠', nini: 'Nini 🟣', farooq: 'Farooq / Steph 🔵' };
const USER_COLORS = { omar: '#e93ca3', nini: '#8e3cc9', farooq: '#2f7fb0' };
const BH_URL = 'https://www.gov.uk/bank-holidays.json';
const WEATHER_URL = 'https://api.open-meteo.com/v1/forecast?latitude=52.2053&longitude=0.1218&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=Europe%2FLondon&forecast_days=14';
let bankHolidays = {};
let weatherData = {};
let currentUser = localStorage.getItem(STORAGE_KEY);
const savedCompactPreference = localStorage.getItem(COMPACT_KEY);
let compactMode = savedCompactPreference === null ? window.matchMedia('(max-width: 768px)').matches : savedCompactPreference === '1';
let viewDate = new Date();
viewDate.setDate(1);
let data = { omar: {}, nini: {}, farooq: {}, notes: { omar: {}, nini: {}, farooq: {} }, lastUpdated: {}, events: [], dayTags: {}, confirmations: {}, settings: { caldecoteWeekendsOn: false } };
let pendingSave = false;
let saveTimer = null;
let editingEventId = null;
let activeDayModalDate = null;
const today = new Date();
today.setHours(0, 0, 0, 0);
const MIN_MONTH = new Date(today.getFullYear(), 0, 1);
const MAX_MONTH = new Date(today.getFullYear() + 1, 11, 1);
async function init() {
  await Promise.all([loadData(), loadBankHolidays(), loadWeather()]);
  ensureDefaults();
  applyCompactMode();
  if (!currentUser) {
    document.getElementById('user-overlay').style.display = 'flex';
  } else {
    applyUserStyle();
    updateHeader();
  }
  renderAll();
  setInterval(refreshData, 30000);
}
function ensureDefaults() {
  if (!data.settings) data.settings = { caldecoteWeekendsOn: false };
  if (typeof data.settings.caldecoteWeekendsOn !== 'boolean') data.settings.caldecoteWeekendsOn = false;
  if (!Array.isArray(data.events)) data.events = [];
  if (!data.confirmations || typeof data.confirmations !== 'object') data.confirmations = {};
  data.events = data.events.filter(event => !(event.type === 'caldecote' && event.generated));
}
function selectUser(user) {
  currentUser = user;
  localStorage.setItem(STORAGE_KEY, user);
  document.getElementById('user-overlay').style.display = 'none';
  applyUserStyle();
  updateHeader();
  renderAll();
}
function changeUser() {
  localStorage.removeItem(STORAGE_KEY);
  currentUser = null;
  document.getElementById('user-overlay').style.display = 'flex';
}
function applyUserStyle() {
  if (!currentUser) return;
  document.documentElement.style.setProperty('--user-color', USER_COLORS[currentUser]);

    const end = new Date(`${event.endDate}T12:00:00`);
    while (start <= end) {
      for (let i = 0; i < 3; i++) {
        const day = addDays(start, i);
        if (day <= end) {
          out.push({
            ...event,
            occurrenceDate: isoDate(day),
            occurrenceStart: isoDate(start),
            generatedOccurrence: true,
            title: 'Omar kids',
            spanLabel: i === 0 ? 'Fri eve' : i === 1 ? 'Sat' : 'Sun eve'
          });
        }
      }
      start = addDays(start, event.repeatEveryDays);
    }
    return out;
  }
  if (event.endDate && event.endDate > event.date) {
    const out = [];
    let day = new Date(`${event.date}T12:00:00`);
    const end = new Date(`${event.endDate}T12:00:00`);
    while (day <= end) {
      out.push({
        ...event,
        occurrenceDate: isoDate(day),
        occurrenceStart: event.date,
        generatedOccurrence: isoDate(day) !== event.date,
        spanLabel: `${formatDay(event.date)} to ${formatDay(event.endDate)}`

      `DTEND;VALUE=DATE:${toICSDate(exclusiveEnd)}`,
      'END:VEVENT'
    ].join('\r\n');
  });
}
function exportICS() {
  const body = [
    'BEGIN:VCALENDAR',
    'VERSION:2.0',
    'PRODID:-//Rehmans Family Calendar//EN',
    'CALSCALE:GREGORIAN',
    ...buildICSEvents(),
    'END:VCALENDAR'
  ].join('\r\n');
  const blob = new Blob([body], { type: 'text/calendar;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'rehmans-family-calendar.ics';
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}
function escapeHtml(str) {
  return String(str).replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;').replaceAll("'", '&#39;');
}
init();
</script>
